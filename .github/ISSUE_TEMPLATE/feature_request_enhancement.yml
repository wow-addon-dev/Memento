name: Feature Request / Enhancement
description: Suggest an idea or enhancement for this addon.
body:
  - type: dropdown
    id: wow-version
    attributes:
      label: Game Version (Flavor)
      options:
        - Retail
        - Mist of Pandaria - Classic
        - Burning Crusade - Classic Anniversary Edition
        - Classic
    validations:
      required: true

  - type: textarea
    id: feature-description
    attributes:
      label: Describe your idea
      description: What feature or enhancement would you like to see? You can also drag & drop mockup screenshots here.
    validations:
      required: true
