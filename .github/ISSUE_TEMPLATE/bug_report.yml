name: Bug Report
description: Report a bug to help improve this addon.
title: "[BUG] "
labels: ["bug"]
body:
  - type: dropdown
    id: wow-version
    attributes:
      label: WoW Version
      options:
        - Retail
        - Cataclysm Classic
        - Season of Discovery
        - Classic Era / Hardcore
        - Beta / PTR
    validations:
      required: true

  - type: input
    id: addon-version
    attributes:
      label: Addon Version
      placeholder: e.g., v1.4.2
    validations:
      required: true

  - type: dropdown
    id: client-language
    attributes:
      label: Game Client Language
      options:
        - English (enUS / enGB)
        - German (deDE)
        - French (frFR)
        - Spanish (esES / esMX)
        - Russian (ruRU)
        - Other
    validations:
      required: true

  - type: dropdown
    id: conflict-test
    attributes:
      label: Addon Conflict Test
      description: Does the error still occur when ALL other addons except this one are disabled?
      options:
        - "Yes, it still happens."
        - "No, it works fine without other addons."
        - "I haven't tested it yet."
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the Bug & Steps to Reproduce
      description: What exactly is broken, and how can we trigger the error?
    validations:
      required: true

  - type: textarea
    id: lua-error
    attributes:
      label: Lua Error
      description: If you received a Lua error, paste it here.
      render: lua
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, drag and drop screenshots here to help explain the visual problem.
    validations:
      required: false
